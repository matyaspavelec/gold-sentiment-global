<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Sentiment Model</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <h1 class="logo">GOLD SENTIMENT MODEL</h1>
        </div>
        <nav class="header-nav">
            <button class="nav-btn active" data-view="overview">Overview</button>
            <button class="nav-btn" data-view="correlations">Correlations</button>
            <button class="nav-btn" data-view="presidents">Presidential Terms</button>
        </nav>
        <div class="header-right">
            <div class="timeframe-selector">
                <button class="tf-btn" data-tf="4H">4H</button>
                <button class="tf-btn active" data-tf="D">D</button>
                <button class="tf-btn" data-tf="W">W</button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main">
        <!-- Gold Price Section -->
        <section class="chart-section">
            <div class="chart-header">
                <div class="chart-title-group">
                    <h2 class="chart-title">XAU/USD</h2>
                    <span class="chart-price" id="currentPrice">—</span>
                    <span class="chart-change" id="currentChange">—</span>
                </div>
                <div class="chart-legend" id="chartLegend">
                    <span class="legend-item legend-gold">Gold</span>
                </div>
            </div>
            <div class="chart-container" id="mainChart"></div>
            <div class="event-markers-timeline" id="eventTimeline"></div>
        </section>

        <!-- Event Detail Panel -->
        <section class="detail-panel" id="detailPanel">
            <div class="detail-panel-inner">
                <button class="detail-close" id="detailClose">&times;</button>
                <div class="detail-content" id="detailContent">
                    <div class="detail-placeholder">
                        <div class="detail-placeholder-icon">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <circle cx="12" cy="12" r="10"/>
                                <path d="M12 8v4l3 3"/>
                            </svg>
                        </div>
                        <p>Select an event marker on the chart to view sentiment analysis</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Correlation Groups -->
        <section class="correlations-section" id="correlationsSection">
            <div class="correlation-group">
                <div class="group-header">
                    <div class="group-indicator positive"></div>
                    <h3 class="group-title">Positive Correlation</h3>
                    <span class="group-subtitle">Instruments that tend to move with Gold</span>
                </div>
                <div class="correlation-cards" id="positiveCorrelations"></div>
            </div>
            <div class="correlation-group">
                <div class="group-header">
                    <div class="group-indicator negative"></div>
                    <h3 class="group-title">Negative Correlation</h3>
                    <span class="group-subtitle">Instruments that tend to move against Gold</span>
                </div>
                <div class="correlation-cards" id="negativeCorrelations"></div>
            </div>
        </section>

        <!-- Presidential Terms -->
        <section class="presidents-section" id="presidentsSection" style="display:none;">
            <h3 class="section-title">Gold Performance by Presidential Term</h3>
            <div class="presidents-grid" id="presidentsGrid"></div>
        </section>
    </main>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
